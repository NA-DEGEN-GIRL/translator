<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Korean-Japanese Interpreter</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#4A90D9">
</head>
<body>
    <div class="app">
        <!-- Top half: mirrored view for the other person -->
        <section class="mirror-half" id="mirrorHalf">
            <div class="mirror-label">韓国語⇄日本語通訳 / 한국어⇄일본어통역</div>
            <div class="chat-mirror" id="chatMirror"></div>
            <div class="mirror-controls">
                <div class="mirror-interim" id="mirrorInterim"></div>
                <div class="mirror-input-row normal-mode-only" id="mirrorNormalControls">
                    <button class="mic-btn mirror-mic-btn mic-btn-sm" id="mirrorMicBtn" aria-label="マイク">
                        <svg class="mic-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                        <div class="mic-pulse"></div>
                    </button>
                    <span class="mirror-mic-hint">押して話す→韓国語に翻訳</span>
                </div>
                <div class="mirror-realtime-hint realtime-mode-only" id="mirrorRealtimeHint" style="display:none;">
                    <span class="realtime-hint-text">そのまま話してください</span>
                </div>
                <div class="mirror-status" id="mirrorStatus"></div>
            </div>
        </section>

        <hr class="divider">

        <!-- Bottom half: my view + controls -->
        <section class="my-half">
            <div class="my-label">한국어⇄일본어통역 / 韓国語⇄日本語通訳</div>
            <div class="chat-container" id="chatContainer">
                <div class="welcome-msg">
                    <p>한국어 또는 일본어로 입력하세요</p>
                    <p class="sub">언어를 자동으로 감지하여 번역합니다</p>
                </div>
            </div>

            <footer class="controls">
                <div class="settings-row">
                    <label class="silence-setting" title="모드">
                        <select id="pipelineMode">
                            <option value="browser" selected>브라우저</option>
                            <option value="local">로컬</option>
                            <option value="openai">OpenAI</option>
                            <option value="realtime">Realtime</option>
                        </select>
                    </label>
                    <button class="toggle-chip" id="ttsJaToggle" title="일본어 음성 출력">
                        <span class="toggle-dot"></span> J
                    </button>
                    <select class="voice-select" id="voiceJa" title="일본어 음성">
                        <option value="onyx" selected>남</option>
                        <option value="coral">여</option>
                    </select>
                    <button class="toggle-chip" id="ttsKoToggle" title="한국어 음성 출력">
                        <span class="toggle-dot"></span> K
                    </button>
                    <select class="voice-select" id="voiceKo" title="한국어 음성">
                        <option value="nova" selected>여</option>
                        <option value="ash">남</option>
                    </select>
                    <select class="voice-select" id="fontSizeSetting" title="텍스트 크기">
                        <option value="12">12</option>
                        <option value="14">14</option>
                        <option value="16" selected>16</option>
                        <option value="18">18</option>
                        <option value="20">20</option>
                        <option value="24">24</option>
                        <option value="28">28</option>
                        <option value="32">32</option>
                    </select>
                    <select class="voice-select realtime-mode-only" id="vadThreshold" title="VAD 감도">
                        <option value="0.3">0.3</option>
                        <option value="0.4">0.4</option>
                        <option value="0.5">0.5</option>
                        <option value="0.6">0.6</option>
                        <option value="0.7">0.7</option>
                        <option value="0.8">0.8</option>
                        <option value="0.9" selected>0.9</option>
                        <option value="0.95">0.95</option>
                    </select>
                    <select class="voice-select normal-mode-only browser-only" id="silenceTimeout" title="묵음 시간">
                        <option value="auto" selected>auto</option>
                        <option value="2000">2s</option>
                        <option value="3000">3s</option>
                        <option value="5000">5s</option>
                        <option value="7000">7s</option>
                        <option value="0">OFF</option>
                    </select>
                </div>
                <div class="status" id="status"></div>
                <div class="input-row">
                    <input type="text" class="text-input" id="textInput" placeholder="한국어 또는 일본어 입력..." autocomplete="off">
                    <button class="send-btn" id="sendBtn" aria-label="전송">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                    <button class="mic-btn" id="micBtn" aria-label="마이크">
                        <svg class="mic-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                        <div class="mic-pulse"></div>
                    </button>
                    <button class="mic-lang-btn normal-mode-only" id="micLangBtn" title="마이크 인식 언어 전환">
                        <span class="mic-lang-label" id="micLangLabel">KO</span>
                    </button>
                    <button class="clr-btn" id="clearBtn" title="대화 내용 삭제">C</button>
                </div>
                <div class="interim-text" id="interimText"></div>
            </footer>
        </section>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
